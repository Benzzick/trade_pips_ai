services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: trade_pips_ai
      POSTGRES_PASSWORD: "C0R_PdWaEGGZseSS1WCZRyuLYXyflLfK"
    volumes:
      - trade_pips_ai_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "d30Hv82wfHsAGAeh1NXo8rHxOTZT620I"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: trade_pips_ai_test
      POSTGRES_PASSWORD: "pUIIEDyTIo4TNedHZqdnHP18E_QoLdRc"
    volumes:
      - trade_pips_ai_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "tAt80GHtEkwa4VH2AI5f8G7wIgjn333l"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  trade_pips_ai_data:
  trade_pips_ai_test_data:
